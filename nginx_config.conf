server {
    listen 80;
    server_name resultados.algorah.bond 167.86.72.200;

    location / {
        include proxy_params;
        proxy_pass http://unix:/home/cristian/apps/resultadose/elecciones.sock;
    }

    # Configuración opcional para mejorar el rendimiento de archivos estáticos
    location /static {
        alias /home/cristian/apps/resultadose/static;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
